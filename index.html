<!DOCTYPE html>
<html lang="en">
<body style="margin:0; background:white; display:flex; justify-content:center; align-items:center; height:100vh;">

  <video
    id="v"
    autoplay
    muted
    playsinline
    style="
      width: 800px;
      height: auto;
      pointer-events: none;
      display: block;
    ">
    <source src="fourier_name.mp4" type="video/mp4">
  </video>

  <script>
    const v = document.getElementById("v");

    v.addEventListener("ended", () => {
      v.pause();
      v.currentTime = v.duration;
    });
  </script>

</body>
</html>
