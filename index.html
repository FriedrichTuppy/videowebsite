<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fourier-Zeichnung</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-weight: 400;
      margin-bottom: 1rem;
    }

    video {
      max-width: 90vw;
      max-height: 75vh;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
      background: black;
    }

    p {
      margin-top: 1rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fourier-Zeichnung meines Namens</h1>
    <video controls autoplay loop muted>
      <source src="fourier_name.mp4" type="video/mp4">
      Dein Browser unterstützt das Video-Tag nicht.
    </video>
    <p>Animation mit Fourier-Epizykeln</p>
  </div>
</body>
</html>
